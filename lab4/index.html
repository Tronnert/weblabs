<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

    <h1>Weather App</h1>

    <div id="locationError" class="hidden">
        <p>Faild to get current location.</p>
        <input id="cityInput" placeholder="Введите город">
        <button id="addCityBtn">Add city</button>
        <p id="cityError" class="error hidden"></p>
    </div>

    <button id="refreshBtn">Refresh</button>
    <button id="clearBtn">Clear</button>
    <div id="citiesContainer"></div>

</div>

<script src="js/app.js"></script>
</body>
</html>
